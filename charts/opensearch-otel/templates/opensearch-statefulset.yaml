---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensearch-otel.fullname" . }}-opensearch
  labels:
    {{- include "opensearch-otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opensearch-otel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: opensearch
  template:
    metadata:
      labels:
        {{- include "opensearch-otel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: opensearch
    spec:
      initContainers:
        - name: sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: opensearch
          image: {{ .Values.opensearch.image }}
          ports:
            - name: http
              containerPort: {{ .Values.opensearch.port }}
            - name: transport
              containerPort: {{ .Values.opensearch.transportPort }}
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          volumeMounts:
            - name: opensearch-config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            - name: tls-certs
              mountPath: /usr/share/opensearch/config/certs
              readOnly: true
      volumes:
        - name: opensearch-config
          configMap:
            name: {{ include "opensearch-otel.fullname" . }}-opensearch-config
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch-otel.fullname" . }}-opensearch
  labels:
    {{- include "opensearch-otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
spec:
  selector:
    {{- include "opensearch-otel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
  ports:
    - name: http
      port: {{ .Values.opensearch.port }}
      targetPort: http
    - name: transport
      port: {{ .Values.opensearch.transportPort }}
      targetPort: transport
